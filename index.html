<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>動画眼マーカー</title>
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
<div id="timecode_block">
    <span id="timecode">00:00:00</span>
    <button class="button" id="start">スタート</button>
    <button class="button" id="show_timecode_settings">設定</button>    
</div>
<div id="timecode_settings_block"></div>
<div id="input_controls_block">
    <input type="text" id="newMemo" />
    <button id="mark" class="button" disabled>記録</button>
</div>
<div id="list_block">
    <div id="list"></div>
</div>
<div id="save_button_block">
    <a href="#" id="save"  download="rename_same_as_movie.dggn.txt" class="button">ファイル保存</a>
</div>
<div id="snippets_block">
    <button id="snippet1" class="button snippet" disabled>F1:</button>
    <button id="snippet2" class="button snippet" disabled>F2:</button>
    <button id="snippet3" class="button snippet" disabled>F3:</button>
    <button id="snippet4" class="button snippet" disabled>F4:</button>
    <button id="snippet5" class="button snippet" disabled>F5:</button>
</div>
</main>
</body>
<script type="text/javascript" src="scripts.js"></script>
</html>
